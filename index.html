<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche d'écoles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .search-container {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        input, button {
            padding: 8px;
            margin: 5px 0;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .result-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Recherche d'écoles</h1>

    <!-- Section pour rechercher une école par nom -->
    <div class="search-container">
        <h2>Rechercher une école par nom</h2>
        <input type="text" id="schoolName" placeholder="Nom de l'école">
        <button onclick="searchSchoolByName()">Rechercher</button>
        <div id="schoolResult" class="result-container"></div>
    </div>

    <!-- Section pour lister les écoles d'une circonscription -->
    <div class="search-container">
        <h2>Lister les écoles d'une circonscription</h2>
        <input type="text" id="circonscription" placeholder="Nom de la circonscription">
        <button onclick="listSchoolsByCirconscription()">Rechercher</button>
        <div id="circonscriptionResult" class="result-container"></div>
    </div>

    <!-- Section pour lister les écoles d'une commune -->
    <div class="search-container">
        <h2>Lister les écoles d'une commune</h2>
        <input type="text" id="commune" placeholder="Nom de la commune">
        <button onclick="listSchoolsByCommune()">Rechercher</button>
        <div id="communeResult" class="result-container"></div>
    </div>

    <script>
        // Variable globale pour stocker les données du CSV
        let schoolsData = [];

        // Charger le fichier CSV
        function loadCSV() {
            // Remplacez cette partie par le chemin réel de votre fichier CSV
            // Pour une iframe, vous pouvez héberger le fichier CSV sur un serveur ou utiliser un lien direct
            fetch('fr-en-annuaire-education.csv')
                .then(response => response.text())
                .then(data => {
                    // Parser le CSV
                    const rows = data.split('\n');
                    const headers = rows[0].split(';');

                    // Extraire les données
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i].split(';');
                        if (row.length === headers.length) {
                            const school = {};
                            for (let j = 0; j < headers.length; j++) {
                                school[headers[j]] = row[j];
                            }
                            schoolsData.push(school);
                        }
                    }
                    console.log('Données chargées avec succès !');
                })
                .catch(error => {
                    console.error('Erreur lors du chargement du fichier CSV :', error);
                });
        }

        // Rechercher une école par nom
        function searchSchoolByName() {
            const schoolName = document.getElementById('schoolName').value.toLowerCase();
            const resultDiv = document.getElementById('schoolResult');

            if (!schoolName) {
                resultDiv.innerHTML = '<p>Veuillez entrer un nom d\'école.</p>';
                return;
            }

            const results = schoolsData.filter(school =>
                school['Nom de l\'école'] && school['Nom de l\'école'].toLowerCase().includes(schoolName)
            );

            if (results.length === 0) {
                resultDiv.innerHTML = '<p>Aucune école trouvée avec ce nom.</p>';
            } else {
                let tableHTML = `
                    <h3>Résultats pour "${schoolName}"</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Nom de l'école</th>
                                <th>Circonscription</th>
                                <th>Commune</th>
                                <th>Adresse</th>
                                <th>Téléphone</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                results.forEach(school => {
                    tableHTML += `
                        <tr>
                            <td>${school['Nom de l\'école'] || 'N/A'}</td>
                            <td>${school['Circonscription'] || 'N/A'}</td>
                            <td>${school['Commune'] || 'N/A'}</td>
                            <td>${school['Adresse'] || 'N/A'}</td>
                            <td>${school['Téléphone'] || 'N/A'}</td>
                        </tr>
                    `;
                });

                tableHTML += `
                        </tbody>
                    </table>
                `;

                resultDiv.innerHTML = tableHTML;
            }
        }

        // Lister les écoles d'une circonscription
        function listSchoolsByCirconscription() {
            const circonscription = document.getElementById('circonscription').value.toLowerCase();
            const resultDiv = document.getElementById('circonscriptionResult');

            if (!circonscription) {
                resultDiv.innerHTML = '<p>Veuillez entrer une circonscription.</p>';
                return;
            }

            const results = schoolsData.filter(school =>
                school['Circonscription'] && school['Circonscription'].toLowerCase().includes(circonscription)
            );

            if (results.length === 0) {
                resultDiv.innerHTML = '<p>Aucune école trouvée pour cette circonscription.</p>';
            } else {
                let tableHTML = `
                    <h3>Écoles de la circonscription "${circonscription}"</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Nom de l'école</th>
                                <th>Commune</th>
                                <th>Adresse</th>
                                <th>Téléphone</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                results.forEach(school => {
                    tableHTML += `
                        <tr>
                            <td>${school['Nom de l\'école'] || 'N/A'}</td>
                            <td>${school['Commune'] || 'N/A'}</td>
                            <td>${school['Adresse'] || 'N/A'}</td>
                            <td>${school['Téléphone'] || 'N/A'}</td>
                        </tr>
                    `;
                });

                tableHTML += `
                        </tbody>
                    </table>
                `;

                resultDiv.innerHTML = tableHTML;
            }
        }

        // Lister les écoles d'une commune
        function listSchoolsByCommune() {
            const commune = document.getElementById('commune').value.toLowerCase();
            const resultDiv = document.getElementById('communeResult');

            if (!commune) {
                resultDiv.innerHTML = '<p>Veuillez entrer une commune.</p>';
                return;
            }

            const results = schoolsData.filter(school =>
                school['Commune'] && school['Commune'].toLowerCase().includes(commune)
            );

            if (results.length === 0) {
                resultDiv.innerHTML = '<p>Aucune école trouvée pour cette commune.</p>';
            } else {
                let tableHTML = `
                    <h3>Écoles de la commune "${commune}"</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Nom de l'école</th>
                                <th>Circonscription</th>
                                <th>Adresse</th>
                                <th>Téléphone</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                results.forEach(school => {
                    tableHTML += `
                        <tr>
                            <td>${school['Nom de l\'école'] || 'N/A'}</td>
                            <td>${school['Circonscription'] || 'N/A'}</td>
                            <td>${school['Adresse'] || 'N/A'}</td>
                            <td>${school['Téléphone'] || 'N/A'}</td>
                        </tr>
                    `;
                });

                tableHTML += `
                        </tbody>
                    </table>
                `;

                resultDiv.innerHTML = tableHTML;
            }
        }

        // Charger le CSV au démarrage
        window.onload = loadCSV;
    </script>
</body>
</html>
