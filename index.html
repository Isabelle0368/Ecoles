<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recherche d'écoles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .search-container {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        input, button, select {
            padding: 8px;
            margin: 5px 0;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .result-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Recherche d'écoles</h1>

    <!-- Section pour rechercher une école par nom -->
    <div class="search-container">
        <h2>Rechercher une école par nom</h2>
        <input type="text" id="schoolName" placeholder="Nom de l'école">
        <button onclick="searchSchoolByName()">Rechercher</button>
        <div id="schoolResult" class="result-container"></div>
    </div>

    <!-- Section pour filtrer les écoles par commune ou circonscription -->
    <div class="search-container">
        <h2>Filtrer les écoles</h2>
        <select id="filterCommune" onchange="updateSchoolsTable()">
            <option value="">-- Filtrer par commune --</option>
        </select>
        <select id="filterCirconscription" onchange="updateSchoolsTable()">
            <option value="">-- Filtrer par circonscription --</option>
        </select>
        <button onclick="resetFilters()">Réinitialiser</button>
        <div id="schoolsTable" class="result-container"></div>
    </div>

    <script>
        // Variable globale pour stocker les données du JSON
        let schoolsData = [];

        // Charger le fichier JSON
        function loadJSON() {
            // Remplacez par le chemin correct vers votre fichier ecoles.json
            fetch('ecoles.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('Erreur lors du chargement du fichier JSON');
                    }
                    return response.json();
                })
                .then(data => {
                    schoolsData = data;
                    console.log('Données chargées avec succès !', schoolsData);

                    // Remplir les listes déroulantes pour les filtres
                    fillFilterOptions();
                    // Afficher toutes les écoles par défaut
                    displayAllSchools();
                })
                .catch(error => {
                    console.error('Erreur lors du chargement du fichier JSON :', error);
                    document.getElementById('schoolsTable').innerHTML = `<p style="color:red;">Erreur lors du chargement des données. Vérifiez la console pour plus de détails.</p>`;
                });
        }

        // Remplir les options des listes déroulantes pour les filtres
        function fillFilterOptions() {
            const communes = [...new Set(schoolsData.map(school => school['Commune']))].filter(commune => commune);
            const circonscriptions = [...new Set(schoolsData.map(school => school['Circonscription']))].filter(circonscription => circonscription);

            const filterCommune = document.getElementById('filterCommune');
            communes.forEach(commune => {
                const option = document.createElement('option');
                option.value = commune;
                option.textContent = commune;
                filterCommune.appendChild(option);
            });

            const filterCirconscription = document.getElementById('filterCirconscription');
            circonscriptions.forEach(circonscription => {
                const option = document.createElement('option');
                option.value = circonscription;
                option.textContent = circonscription;
                filterCirconscription.appendChild(option);
            });
        }

        // Afficher toutes les écoles
        function displayAllSchools() {
            updateSchoolsTable();
        }

        // Mettre à jour le tableau des écoles en fonction des filtres
        function updateSchoolsTable() {
            const selectedCommune = document.getElementById('filterCommune').value;
            const selectedCirconscription = document.getElementById('filterCirconscription').value;

            let filteredData = schoolsData;

            if (selectedCommune) {
                filteredData = filteredData.filter(school => school['Commune'] === selectedCommune);
            }

            if (selectedCirconscription) {
                filteredData = filteredData.filter(school => school['Circonscription'] === selectedCirconscription);
            }

            displaySchools(filteredData);
        }

        // Réinitialiser les filtres
        function resetFilters() {
            document.getElementById('filterCommune').value = '';
            document.getElementById('filterCirconscription').value = '';
            updateSchoolsTable();
        }

        // Afficher les écoles dans un tableau
        function displaySchools(data) {
            const resultDiv = document.getElementById('schoolsTable');

            if (data.length === 0) {
                resultDiv.innerHTML = '<p>Aucune école trouvée.</p>';
                return;
            }

            let tableHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Nom de l'école</th>
                            <th>Circonscription</th>
                            <th>Commune</th>
                            <th>Adresse</th>
                            <th>Téléphone</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(school => {
                tableHTML += `
                    <tr>
                        <td>${school['Nom de l\'école'] || 'N/A'}</td>
                        <td>${school['Circonscription'] || 'N/A'}</td>
                        <td>${school['Commune'] || 'N/A'}</td>
                        <td>${school['Adresse'] || 'N/A'}</td>
                        <td>${school['Téléphone'] || 'N/A'}</td>
                    </tr>
                `;
            });

            tableHTML += `
                    </tbody>
                </table>
            `;

            resultDiv.innerHTML = tableHTML;
        }

        // Rechercher une école par nom
        function searchSchoolByName() {
            const schoolName = document.getElementById('schoolName').value.toLowerCase();
            const resultDiv = document.getElementById('schoolResult');

            if (!schoolName) {
                resultDiv.innerHTML = '<p>Veuillez entrer un nom d\'école.</p>';
                return;
            }

            const results = schoolsData.filter(school =>
                school['Nom de l\'école'] && school['Nom de l\'école'].toLowerCase().includes(schoolName)
            );

            if (results.length === 0) {
                resultDiv.innerHTML = '<p>Aucune école trouvée avec ce nom.</p>';
            } else {
                displaySchools(results);
            }
        }

        // Charger le JSON au démarrage
        window.onload = loadJSON;
    </script>
</body>
</html>
