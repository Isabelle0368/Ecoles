<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Recherche d'écoles</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 800px;
        }
        #search {
            padding: 10px;
            width: 100%;
            margin-bottom: 20px;
        }
        .filters {
            margin-bottom: 20px;
        }
        select, button {
            padding: 8px;
            margin-right: 10px;
        }
        .result {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
        }
        .no-results {
            color: #666;
            font-style: italic;
        }
        .coordinates {
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Recherche d'écoles</h1>

    <!-- Recherche par nom -->
    <input type="text" id="search" placeholder="Rechercher une école par nom...">

    <!-- Filtres par commune et circonscription -->
    <div class="filters">
        <select id="commune-filter">
            <option value="">-- Filtrer par commune --</option>
        </select>
        <select id="circonscription-filter">
            <option value="">-- Filtrer par circonscription --</option>
        </select>
        <button onclick="resetFilters()">Réinitialiser</button>
    </div>

    <!-- Résultats -->
    <div id="results"></div>

    <script>
        // Charger les données depuis le fichier JSON
        fetch('fr-en-annuaire-education.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`Erreur HTTP! statut: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log("Données chargées avec succès :", data);
                if (!data || data.length === 0) {
                    throw new Error("Le fichier JSON est vide ou incorrect.");
                }
                const ecoles = data;
                populateFilters(ecoles);
                displayResults(ecoles);

                // Recherche par nom
                document.getElementById('search').addEventListener('input', function() {
                    const searchTerm = this.value.trim().toLowerCase();
                    if (searchTerm === '') {
                        applyFilters();
                        return;
                    }
                    const filtered = ecoles.filter(ecole =>
                        ecole.nom_etablissement.toLowerCase().includes(searchTerm)
                    );
                    displayResults(filtered);
                });

                // Filtres
                document.getElementById('commune-filter').addEventListener('change', applyFilters);
                document.getElementById('circonscription-filter').addEventListener('change', applyFilters);
            })
            .catch(error => {
                console.error('Erreur lors du chargement des données :', error);
                document.getElementById('results').innerHTML = `<p class="no-results">Erreur de chargement des données : ${error.message}. Vérifiez que le fichier fr-en-annuaire-education.json est présent et correctement formaté.</p>`;
            });

        // Remplir les filtres avec les valeurs uniques
        function populateFilters(ecoles) {
            // Vérifier que les colonnes existent
            if (!ecoles[0].hasOwnProperty('commune') && !ecoles[0].hasOwnProperty('Commune')) {
                console.error("La colonne 'commune' est introuvable dans les données.");
                return;
            }

            if (!ecoles[0].hasOwnProperty('circonscription') && !ecoles[0].hasOwnProperty('Circonscription')) {
                console.error("La colonne 'circonscription' est introuvable dans les données.");
                return;
            }

            // Déterminer les clés à utiliser
            const communeKey = ecoles[0].hasOwnProperty('commune') ? 'commune' : 'Commune';
            const circonscriptionKey = ecoles[0].hasOwnProperty('circonscription') ? 'circonscription' : 'Circonscription';

            // Extraire les valeurs uniques pour les communes
            const communes = [...new Set(ecoles.map(ecole => ecole[communeKey]))].filter(commune => commune);
            const communeFilter = document.getElementById('commune-filter');
            communes.forEach(commune => {
                const option = document.createElement('option');
                option.value = commune;
                option.textContent = commune;
                communeFilter.appendChild(option);
            });

            // Extraire les valeurs uniques pour les circonscriptions
            const circonscriptions = [...new Set(ecoles.map(ecole => ecole[circonscriptionKey]))].filter(circonscription => circonscription);
            const circonscriptionFilter = document.getElementById('circonscription-filter');
            circonscriptions.forEach(circonscription => {
                const option = document.createElement('option');
                option.value = circonscription;
                option.textContent = circonscription;
                circonscriptionFilter.appendChild(option);
            });
        }

        // Appliquer les filtres
        function applyFilters() {
            const searchTerm = document.getElementById('search').value.trim().toLowerCase();
            const selectedCommune = document.getElementById('commune-filter').value;
            const selectedCirconscription = document.getElementById('circonscription-filter').value;

            fetch('fr-en-annuaire-education.json')
                .then(response => response.json())
                .then(ecoles => {
                    if (!ecoles || ecoles.length === 0) {
                        throw new Error("Le fichier JSON est vide ou incorrect.");
                    }

                    let filtered = [...ecoles];

                    if (searchTerm !== '') {
                        filtered = filtered.filter(ecole =>
                            ecole.nom_etablissement.toLowerCase().includes(searchTerm)
                        );
                    }

                    if (selectedCommune !== '') {
                        const communeKey = ecoles[0].hasOwnProperty('commune') ? 'commune' : 'Commune';
                        filtered = filtered.filter(ecole => ecole[communeKey] === selectedCommune);
                    }

                    if (selectedCirconscription !== '') {
                        const circonscriptionKey = ecoles[0].hasOwnProperty('circonscription') ? 'circonscription' : 'Circonscription';
                        filtered = filtered.filter(ecole => ecole[circonscriptionKey] === selectedCirconscription);
                    }

                    displayResults(filtered);
                })
                .catch(error => {
                    console.error('Erreur lors de l\'application des filtres :', error);
                    document.getElementById('results').innerHTML = `<p class="no-results">Erreur lors de l'application des filtres : ${error.message}</p>`;
                });
        }

        // Réinitialiser les filtres
        function resetFilters() {
            document.getElementById('search').value = '';
            document.getElementById('commune-filter').value = '';
            document.getElementById('circonscription-filter').value = '';
            fetch('fr-en-annuaire-education.json')
                .then(response => response.json())
                .then(ecoles => displayResults(ecoles))
                .catch(error => {
                    console.error('Erreur lors de la réinitialisation des filtres :', error);
                    document.getElementById('results').innerHTML = `<p class="no-results">Erreur lors de la réinitialisation des filtres : ${error.message}</p>`;
                });
        }

        // Afficher les résultats
        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (results.length === 0) {
                resultsDiv.innerHTML = '<p class="no-results">Aucun résultat trouvé.</p>';
                return;
            }

            // Déterminer les clés à utiliser
            const communeKey = results[0].hasOwnProperty('commune') ? 'commune' : 'Commune';
            const circonscriptionKey = results[0].hasOwnProperty('circonscription') ? 'circonscription' : 'Circonscription';
            const adresseKey = results[0].hasOwnProperty('adresse_1') ? 'adresse_1' : 'adresse';

            results.forEach(ecole => {
                const div = document.createElement('div');
                div.className = 'result';

                // Afficher les informations de l'école
                div.innerHTML = `
                    <strong>${ecole.nom_etablissement}</strong><br>
                    Commune : ${ecole[communeKey]}<br>
                    Circonscription : ${ecole[circonscriptionKey]}<br>
                    ${ecole[adresseKey] ? `<span class="coordinates">Adresse : ${ecole[adresseKey]}</span>` : ''}
                `;
                resultsDiv.appendChild(div);
            });
        }
    </script>
</body>
</html>
